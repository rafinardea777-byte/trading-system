<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1421"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="80" fill="none" stroke="#1e2d3d" stroke-width="3"/>
  <!-- Chart line -->
  <polyline points="80,360 150,300 220,330 290,220 360,260 432,140"
            fill="none" stroke="url(#line)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on data points -->
  <circle cx="432" cy="140" r="14" fill="#00ff88"/>
  <circle cx="80" cy="360" r="10" fill="#00d4ff"/>
  <!-- TP -->
  <text x="256" y="450" text-anchor="middle" fill="#ffd700" font-family="Arial,sans-serif" font-size="60" font-weight="900">TP</text>
</svg>
